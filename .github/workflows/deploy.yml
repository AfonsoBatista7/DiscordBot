name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  IMAGE_NAME: discord-bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata
      id: meta
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "OWNER=${OWNER}" >> $GITHUB_OUTPUT
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAGS=ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:${TAG},ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
        else
          echo "TAGS=ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
        fi

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        platforms: linux/arm64
        tags: ${{ steps.meta.outputs.TAGS }}

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: write
    steps:
    - name: Delete old package versions
      uses: actions/delete-package-versions@v5
      with:
        package-name: ${{ env.IMAGE_NAME }}
        package-type: container
        min-versions-to-keep: 5
        delete-only-untagged-pre-release-versions: false
